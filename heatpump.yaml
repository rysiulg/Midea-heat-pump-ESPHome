logger:
  baud_rate: 0
  level: INFO
modbus:
  flow_control_pin: 5
  id: heatpump_modbus
modbus_controller:
- address: 1
  id: ${devicename}
  modbus_id: heatpump_modbus
  setup_priority: -10
  update_interval: 10s
number:
- address: 2
  entity_category: config
  icon: mdi:temperature-celsius
  id: ${devicename}_set_water_temperature_t1s_zone_1
  lambda: "// Update the global var unmasked_value_water_temperature_t1s\nid(unmasked_value_water_temperature_t1s)\
    \ = x;\n\n// ESP_LOGI(\"\",\"unmasked_value_water_temperature_t1s: %d\",id(unmasked_value_water_temperature_t1s));\n\
    \nuint8_t value_bytes[2];\nuint16_t value = x;\nvalue_bytes[0] = value >> 8; \
    \    // high byte (zone 2)\nvalue_bytes[1] = value & 0x00FF; // low byte (zone\
    \ 1)\n\nauto operation_state = id(${devicename}_operational_mode).state;\nauto\
    \ end_heating_unit = id(${devicename}_zone_1_end_heating_mode_emission_type).state;\n\
    auto end_cooling_unit = id(${devicename}_zone_1_end_cooling_mode_emission_type).state;\n\
    uint8_t x_tmp = value_bytes[1];\nif (operation_state == \"Cool\") {\n  if (x_tmp\
    \ < 5 and end_cooling_unit == \"Fan Coil Unit\") value_bytes[1] = 5;\n  if (x_tmp\
    \ < 18 and end_cooling_unit != \"Fan Coil Unit\") value_bytes[1] = 18;\n  if (x_tmp\
    \ > 25) value_bytes[1] = 25;\n} else if (operation_state == \"Heat\") {\n  if\
    \ (x_tmp < 25 and end_heating_unit == \"Underfloor Heating\") value_bytes[1] =\
    \ 25;\n  if (x_tmp > 55 and end_heating_unit == \"Underfloor Heating\") value_bytes[1]\
    \ = 55;\n  if (x_tmp < 35 and end_heating_unit == \"Radiator\") value_bytes[1]\
    \ = 35;\n  if (x_tmp > 65 and end_heating_unit == \"Radiator\") value_bytes[1]\
    \ = 65;\n}\n// ESP_LOGI(\"Register 2Low\",\"Zone 1 is %d    Zone 2 is %d\", value_bytes[1],\
    \ value_bytes[0]);\n\nreturn value_bytes[1];"
  max_value: 65
  min_value: 5
  modbus_controller_id: ${devicename}
  mode: slider
  name: Set Water Temperature T1S Zone 1
  platform: modbus_controller
  register_type: holding
  unit_of_measurement: "\xB0C"
  value_type: U_WORD
  write_lambda: "uint16_t value = id(unmasked_value_water_temperature_t1s); // The\
    \ original unmasked value\nuint8_t value_byte = x;                           \
    \         // New byte value with the new temp for zone 1\nauto operation_state\
    \ = id(${devicename}_operational_mode).state;\nauto end_heating_unit = id(${devicename}_zone_1_end_heating_mode_emission_type).state;\n\
    auto end_cooling_unit = id(${devicename}_zone_1_end_cooling_mode_emission_type).state;\n\
    \nif (operation_state == \"Cool\") {\n  if (x < 5 and end_cooling_unit == \"Fan\
    \ Coil Unit\") value_byte = 5;\n  if (x < 18 and end_cooling_unit != \"Fan Coil\
    \ Unit\") value_byte = 18;\n  if (x > 25) value_byte = 25;\n} else if (operation_state\
    \ == \"Heat\" or operation_state == \"Auto\") {\n  if (x < 25 and end_heating_unit\
    \ == \"Underfloor Heating\") value_byte = 25;\n  if (x > 55 and end_heating_unit\
    \ == \"Underfloor Heating\") value_byte = 55;\n  if (x < 35 and end_heating_unit\
    \ == \"Radiator\") value_byte = 35;\n  if (x > 65 and end_heating_unit == \"Radiator\"\
    ) value_byte = 65;\n}\nvalue &= 0xFF00;      // Clear the lower byte of the value\n\
    value |= value_byte;  // Update the lower byte with the new byte value\n\nESP_LOGI(\"\
    Register 6Low, set_water_temperature_t1s_zone_1\", \"Set option to %f, Original\
    \ value 0x%x New value: 0x%x\", float(x), id(unmasked_value_water_temperature_t1s),\
    \ value);\n\n\nesphome::modbus_controller::ModbusCommandItem set_payload_command\
    \ = esphome::modbus_controller::ModbusCommandItem::create_write_single_command(${devicename},\
    \ 0x2, value);\n${devicename}->queue_command(set_payload_command);\nid(unmasked_value_water_temperature_t1s)\
    \ = value;\nreturn {};"
- address: 2
  entity_category: config
  icon: mdi:temperature-celsius
