- icon: mdi:power
  id: ${devicename}_heat_pump_running
  lambda: "int fan_speed = id(${devicename}_fan_speed).state;\nint compressor_frequency\
    \ = id(${devicename}_compressor_operating_frequency).state;\nbool external_water_pump_on\
    \ = id(${devicename}_load_output_external_water_pump_p_o).state;\n\n// If fan_speed\
    \ is above 0, compressor_frequency is above 0 or external_water_pump_on is true,\n\
    // then the outside unit of the heat pump system is running\nif (fan_speed > 0\
    \ || compressor_frequency > 0 || external_water_pump_on) {\n    return true;\n\
    } else {\n    return false;\n}"
  name: Heat pump running
  platform: template
